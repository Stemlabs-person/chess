<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KnightSchool Chess</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon">♞</span>
      <span class="brand-name">KnightSchool</span>
    </div>
    <nav class="tabs">
      <button class="tab-btn active" data-view="home">Home</button>
      <button class="tab-btn" data-view="play">Play</button>
      <button class="tab-btn" data-view="puzzles">Puzzles</button>
      <button class="tab-btn" data-view="lessons">Lessons</button>
    </nav>
  </header>

  <main>
    <!-- HOME -->
    <section id="view-home" class="view active">
      <div class="hero">
        <h1>Learn. Play. Solve. <span class="accent">Have fun!</span></h1>
        <p>A friendly place to learn chess, play with a friend, and crack fun puzzles.</p>
        <div class="hero-cards">
          <button class="hero-card" data-goto="play">
            <span class="hero-emoji">🤝</span>
            <h3>Play a Friend</h3>
            <p>Two players, one computer. Take turns and battle it out!</p>
          </button>
          <button class="hero-card" data-goto="puzzles">
            <span class="hero-emoji">🧩</span>
            <h3>Puzzles</h3>
            <p>Find the winning move! Fun brain teasers for every level.</p>
          </button>
          <button class="hero-card" data-goto="lessons">
            <span class="hero-emoji">🎓</span>
            <h3>Lessons</h3>
            <p>Short, easy lessons to learn how every piece moves.</p>
          </button>
        </div>
      </div>
    </section>

    <!-- PLAY -->
    <section id="view-play" class="view">
      <div class="play-layout">
        <div class="board-wrap">
          <div id="play-status" class="status-banner">White's turn</div>
          <div id="play-board" class="board"></div>
          <div class="board-controls">
            <button id="play-new" class="btn btn-primary">New Game</button>
            <button id="play-undo" class="btn">Undo</button>
            <button id="play-flip" class="btn">Flip Board</button>
          </div>
        </div>
        <aside class="side-panel">
          <h3>Captured Pieces</h3>
          <div class="captured-row">
            <span class="cap-label">White captured</span>
            <div id="cap-white" class="cap-pieces"></div>
          </div>
          <div class="captured-row">
            <span class="cap-label">Black captured</span>
            <div id="cap-black" class="cap-pieces"></div>
          </div>
          <h3>Move History</h3>
          <ol id="move-history" class="move-history"></ol>
        </aside>
      </div>
    </section>

    <!-- PUZZLES -->
    <section id="view-puzzles" class="view">
      <div class="puzzles-layout">
        <div class="board-wrap">
          <div id="puzzle-status" class="status-banner">Find the best move!</div>
          <div id="puzzle-board" class="board"></div>
          <div class="board-controls">
            <button id="puzzle-hint" class="btn">Hint 💡</button>
            <button id="puzzle-reset" class="btn">Reset Puzzle</button>
          </div>
        </div>
        <aside class="side-panel">
          <h3 id="puzzle-title">Puzzle 1</h3>
          <p id="puzzle-desc" class="puzzle-desc"></p>
          <div id="puzzle-message" class="puzzle-message"></div>
          <div class="puzzle-list" id="puzzle-list"></div>
        </aside>
      </div>
    </section>

    <!-- LESSONS -->
    <section id="view-lessons" class="view">
      <div id="lessons-menu" class="lessons-grid"></div>
      <div id="lesson-detail" class="lesson-detail hidden">
        <button id="lesson-back" class="btn">← Back to Lessons</button>
        <div class="lesson-layout">
          <div class="board-wrap">
            <div id="lesson-status" class="status-banner"></div>
            <div id="lesson-board" class="board"></div>
          </div>
          <aside class="side-panel">
            <h3 id="lesson-title"></h3>
            <p id="lesson-text"></p>
            <button id="lesson-next" class="btn btn-primary">Next Lesson →</button>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">Made for young chess champions ♟️</footer>

  <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
